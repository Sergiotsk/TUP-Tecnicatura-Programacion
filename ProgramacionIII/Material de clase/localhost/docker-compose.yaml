services:
  php:
    image: php:8.2-fpm
    container_name: php-fpm
    volumes:
      - ./html:/var/www/html  # '.' significa la carpeta actual de tu proyecto

  nginx:
    image: nginx:1.24
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./config/default.conf:/etc/nginx/conf.d/default.conf
      - ./html:/var/www/html
    depends_on:
      - php
      - db

  db:
    image: mysql:8.4.2
    container_name: db  # <--- Esto fuerza a que el nombre sea "db" siempre
    environment:
      MYSQL_ROOT_PASSWORD: chiti1234
      MYSQL_DATABASE: datos
      MYSQL_USER: osvaldo
      MYSQL_PASSWORD: chiti5678
    volumes:
      - ./mysql_data:/var/lib/mysql # Guarda la DB en una carpeta local para no perder datos
    ports:
      - "3306:3306"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:5.1.1
    container_name: phpmyadmin
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: osvaldo
      PMA_PASSWORD: chiti5678
    ports:
      - "8080:80"
    depends_on:
      - db