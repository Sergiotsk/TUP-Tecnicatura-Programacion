<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>

<body>
    <form action="https://cantone.com.ar/procesa_formulario.php" method="POST">

        <label for="nombre_usuario">Nombre:</label>
        <input type="text" id="nombre" name="nombre_usuario" required>
        <br><br>

        <label for="apellido_usuario">Apellido:</label>
        <input type="text" id="apellido" name="apellido_usuario" required>
        <br><br>

        <label for="dni_usuario">DNI:</label>
        <input type="text" id="dni" name="dni_usuario" required>
        <br><br>

        <label for="email_usuario">Email:</label>
        <input type="email" id="email" name="email_usuario" required>
        <br><br>

        <label for="fecha_ingreso">Fecha:</label>
        <input type="date" id="fecha" name="fecha_ingreso" required>
        <br><br>

        <label for="url_portfolio">URL:</label>
        <input type="url" id="url" name="url_portfolio">
        <br><br>

        <button type="submit">Enviar</button>

    </form>
</body>

</html>
