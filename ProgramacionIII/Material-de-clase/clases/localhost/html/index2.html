        function verifica(e){

            e.preventDefault();

            let espanes = document.getElementsByName("serror");
            for( let i=0; i<espanes.length; i++){
                espanes[i].style.color="black";
                espanes[i].innerHTML = "";
            }
            let error = false;
            if(document.F1.nombre.value == "") {
                let tx=document.getElementById("snombre");
                tx.style.color="red";
                tx.innerHTML="Complete el nombre";
                error = true;
            }
            else if(document.F1.apellido.value == "") {
                    let p1=document.getElementById("sapellido");
                    p1.style.color="red";
                    p1.innerHTML="Complete el apellido";
                    error = true;
                }
            if (!error) procesa(e);
       
        }
    </script>
